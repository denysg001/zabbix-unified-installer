name: Validate installer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate installer
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NONINTERACTIVE: "1"
      CI: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Syntax check
        run: bash -n AUTOMACAO-ZBX-UNIFIED.sh

      - name: Encoding validation
        run: |
          file AUTOMACAO-ZBX-UNIFIED.sh
          iconv -f UTF-8 -t UTF-8 AUTOMACAO-ZBX-UNIFIED.sh >/dev/null
          ! grep -P '\r' AUTOMACAO-ZBX-UNIFIED.sh

      - name: Basic execution test
        run: |
          chmod +x AUTOMACAO-ZBX-UNIFIED.sh
          timeout 30s ./AUTOMACAO-ZBX-UNIFIED.sh --help

      - name: Installer self-test
        run: bash AUTOMACAO-ZBX-UNIFIED.sh --self-test

      - name: ShellCheck validation
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error

  container-test:
    name: Smoke test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Debian 12
            image: debian:12
    container:
      image: ${{ matrix.image }}
    env:
      NONINTERACTIVE: "1"
      CI: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install smoke-test dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bash curl grep sed gawk coreutils git ca-certificates

      - name: Checkout
        uses: actions/checkout@v6

      - name: Basic execution test
        run: |
          chmod +x AUTOMACAO-ZBX-UNIFIED.sh
          timeout 30s ./AUTOMACAO-ZBX-UNIFIED.sh --help

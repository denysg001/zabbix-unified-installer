name: Lint and test

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install lint tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends shellcheck shfmt

            - name: ShellCheck
              run: shellcheck -S warning AUTOMACAO-ZBX-UNIFIED.sh

            - name: shfmt
              run: shfmt -d -i 4 AUTOMACAO-ZBX-UNIFIED.sh

            - name: Bash syntax
              run: bash -n AUTOMACAO-ZBX-UNIFIED.sh

    test:
        needs: lint
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install bats-core
              run: |
                  git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
                  sudo /tmp/bats-core/install.sh /usr/local

            - name: Run tests
              run: bats tests/
